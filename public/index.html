<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>八王子市gigaスクール情報ポータル</title>
<meta name="description" content="シュルカー">
<meta name="keywords" content="シュルカー">
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #222; color: white; font-family: sans-serif;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; background-color: #111; cursor: crosshair; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #weapon-select { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 10; font-size: 18px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>2Dオンラインバトル</h1>
        <p>【移動】矢印キー / WASD ／ 【攻撃】スペースキー長押し</p>
    </div>

    <div id="weapon-select">
        現在の武器: <span id="current-weapon-txt" style="color: #fffa65; font-weight: bold;">マシンガン</span><br>
        <span style="font-size: 14px; color: #aaa;">（やられた後に 1:マシンガン / 2:ショットガン / 3:スナイパー で変更）</span>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            socket.emit('update_stage_size', { width: canvas.width, height: canvas.height });
        }
        window.addEventListener('resize', resizeCanvas);

        let myPlayer = {
            x: Math.random() * 400 + 100,
            y: Math.random() * 400 + 100,
            size: 30,
            color: 'rgb(' + Math.floor(Math.random()*255) + ',' + Math.floor(Math.random()*255) + ',255)',
            hp: 50,
            maxHp: 50,
            alive: true
        };

        let allPlayers = {};
        let allBullets = [];
        let allObstacles = [];
        let myWeapon = 'machinegun'; // 手元の仮変数

        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false, Space: false };
        let mouseX = 0; let mouseY = 0; let shootCooldown = 0;

        // 画面のテキストを書き換えるだけの関数
        function updateWeaponText(type) {
            const names = { machinegun: 'マシンガン', shotgun: 'ショットガン', sniper: 'スナイパー' };
            document.getElementById('current-weapon-txt').textContent = names[type] || 'マシンガン';
        }

        // キーボード入力
        window.addEventListener('keydown', (e) => { 
            if (e.key in keys) keys[e.key] = true; 
            if (e.code === 'Space') { keys.Space = true; e.preventDefault(); }

            // ゲームオーバー時のみ武器変更
            if (!myPlayer.alive) {
                let selected = '';
                if (e.key === '1') selected = 'machinegun';
                if (e.key === '2') selected = 'shotgun';
                if (e.key === '3') selected = 'sniper';

                if (selected) {
                    myWeapon = selected;
                    updateWeaponText(selected);
                    // 💡重要：選んだ瞬間に、サーバーへ「この武器にする！」と即座に送信
                    socket.emit('change_weapon', selected);
                }
            }
        });
        
        window.addEventListener('keyup', (e) => { 
            if (e.key in keys) keys[e.key] = false; 
            if (e.code === 'Space') keys.Space = false;
        });
        window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        // メインループ
        function gameLoop() {
            if (myPlayer.alive) {
                let moved = false;
                const speed = 4;
                if (keys.ArrowUp || keys.w) { myPlayer.y -= speed; moved = true; }
                if (keys.ArrowDown || keys.s) { myPlayer.y += speed; moved = true; }
                if (keys.ArrowLeft || keys.a) { myPlayer.x -= speed; moved = true; }
                if (keys.ArrowRight || keys.d) { myPlayer.x += speed; moved = true; }

                myPlayer.x = Math.max(0, Math.min(canvas.width - myPlayer.size, myPlayer.x));
                myPlayer.y = Math.max(0, Math.min(canvas.height - myPlayer.size, myPlayer.y));

                socket.emit('player_move', { x: myPlayer.x, y: myPlayer.y });

                if (shootCooldown > 0) shootCooldown--;

                if (keys.Space && shootCooldown === 0) {
                    const pX = myPlayer.x + myPlayer.size / 2;
                    const pY = myPlayer.y + myPlayer.size / 2;
                    const angle = Math.atan2(mouseY - pY, mouseX - pX);
                    
                    // 性能判定はサーバーがやるので、ここではタイマーだけ制御
                    if (myWeapon === 'machinegun') {
                        socket.emit('shoot', { x: pX, y: pY, angle: angle });
                        shootCooldown = 10;
                    } else if (myWeapon === 'shotgun') {
                        socket.emit('shoot', { x: pX, y: pY, angle: angle });
                        socket.emit('shoot', { x: pX, y: pY, angle: angle - 0.2 });
                        socket.emit('shoot', { x: pX, y: pY, angle: angle + 0.2 });
                        shootCooldown = 40;
                    } else if (myWeapon === 'sniper') {
                        socket.emit('shoot', { x: pX, y: pY, angle: angle });
                        shootCooldown = 60;
                    }
                }
            }

            // 描画
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let o of allObstacles) { ctx.fillStyle = '#555'; ctx.fillRect(o.x, o.y, o.width, o.height); }

            for (let id in allPlayers) {
                const p = allPlayers[id];
                if (!p.alive) continue;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                if (id === socket.id) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.size, p.size); }

                const barWidth = 40; const barHeight = 6;
                const barX = p.x + (p.size - barWidth) / 2; const barY = p.y - 12;
                ctx.fillStyle = '#333'; ctx.fillRect(barX, barY, barWidth, barHeight);
                ctx.fillStyle = '#2ed573';
                ctx.fillRect(barX, barY, barWidth * (p.hp / p.maxHp), barHeight);
            }

            for (let b of allBullets) {
                ctx.fillStyle = '#fffa65'; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI * 2); ctx.fill();
            }

            if (!myPlayer.alive) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff4757'; ctx.font = 'bold 60px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                ctx.font = '24px sans-serif'; ctx.fillStyle = '#fff';
                ctx.fillText('1, 2, 3キーで武器を選び、F5キー（またはページ更新）で復活！', canvas.width / 2, canvas.height / 2 + 60);
            }

            requestAnimationFrame(gameLoop);
        }

        // サーバーから「お前の武器はこれだぞ」と教えられたら手元を同期
        socket.on('init_weapon', (savedWeapon) => {
            myWeapon = savedWeapon;
            updateWeaponText(savedWeapon);
        });

        socket.on('server_update', (data) => {
            allPlayers = data.players;
            allBullets = data.bullets;
            allObstacles = data.obstacles;
            
            if (myPlayer.alive && allPlayers[socket.id]) {
                myPlayer.hp = allPlayers[socket.id].hp;
                myPlayer.alive = allPlayers[socket.id].alive;
            }
        });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        socket.emit('player_join', myPlayer);
        socket.emit('update_stage_size', { width: canvas.width, height: canvas.height });
        gameLoop();
    </script>
</body>
</html>
